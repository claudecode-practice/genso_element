<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ジュエル・エレメンツ - 118の秘宝 v3</title>
<style>
:root {
  --bg: #04080f;
  --card: #0d1b2a;
  --card2: #112240;
  --accent: #00e5ff;
  --text: #e2e8f0;
  --dim: #64748b;
}
body.light {
  --bg: #f0f4f8;
  --card: #ffffff;
  --card2: #e8edf5;
  --accent: #0077aa;
  --text: #1a202c;
  --dim: #64748b;
}
body.light .el { border-color: #c8d6e8; }
body.light .el.empty { background: #dde5ef; }
body.light header::before { background: radial-gradient(ellipse, #0077aa18 0%, transparent 70%); }
body.light .modal-box { background: linear-gradient(160deg,#fff 0%,#e8edf5 100%); }
body.light .modal-info { background: rgba(0,0,0,0.06); }
body.light .modal-desc { background: rgba(0,119,170,0.05); border-color: rgba(0,119,170,0.2); color:#334155; }
body.light .music-bar { background: rgba(0,119,170,0.06); border-color: rgba(0,119,170,0.2); }
body.light .search-input, body.light .filter-btn { background:#fff; border-color:#c8d6e8; color:var(--text); }
body.light .top-bar-bg { background: rgba(240,244,248,0.92); border-color:#c8d6e8; }
body.light .today-box { background:#fff; border-color:#c8d6e8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* Stars background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, #ffffff22 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, #ffffff18 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, #ffffff15 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, #ffffff20 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, #ffffff12 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}
header {
  text-align: center;
  padding: 32px 20px 12px;
  position: relative;
  z-index: 1;
}
header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 220px;
  background: radial-gradient(ellipse, #00e5ff14 0%, transparent 70%);
  pointer-events: none;
}
h1 {
  font-size: 2em;
  font-weight: 200;
  letter-spacing: 10px;
  color: var(--accent);
  text-shadow: 0 0 30px var(--accent), 0 0 60px #00e5ff44;
  margin-bottom: 6px;
}
.subtitle { color: var(--dim); font-size: 0.82em; letter-spacing: 2px; }

.legend {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 6px; padding: 16px 16px 8px;
  position: relative; z-index: 1;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.7em; color: var(--dim);
}
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.table-wrap { overflow-x: auto; padding: 0 12px 24px; position: relative; z-index: 1; }
.periodic-table {
  display: grid;
  grid-template-columns: repeat(18, 46px);
  gap: 3px;
  min-width: 860px;
  margin: 0 auto;
}
.el {
  width: 46px; height: 56px;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid #1e3a5f;
  position: relative;
  overflow: hidden;
}
.el::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 55%);
  pointer-events: none;
}
.el:hover {
  transform: scale(1.35);
  z-index: 100;
}
.el .num { font-size: 0.5em; color: rgba(255,255,255,0.4); line-height: 1.2; }
.el .sym { font-weight: 700; font-size: 1.05em; line-height: 1.1; }
.el.empty { background: #0a1520; opacity: 0.15; cursor: default; }
.el.empty:hover { transform: none; box-shadow: none; }
.el.spacer { opacity: 0; cursor: default; height: 12px; }

/* Category colors */
.cat-alkali     { background: #1a0a2e; color: #c084fc; border-color: #6d28d9; }
.cat-alkali:hover { box-shadow: 0 0 18px #c084fc88; }
.cat-alkaline   { background: #071a0e; color: #4ade80; border-color: #166534; }
.cat-alkaline:hover { box-shadow: 0 0 18px #4ade8088; }
.cat-transition { background: #070d1e; color: #60a5fa; border-color: #1d4ed8; }
.cat-transition:hover { box-shadow: 0 0 18px #60a5fa88; }
.cat-post       { background: #1a160a; color: #facc15; border-color: #854d0e; }
.cat-post:hover { box-shadow: 0 0 18px #facc1588; }
.cat-metalloid  { background: #071a1a; color: #2dd4bf; border-color: #0f766e; }
.cat-metalloid:hover { box-shadow: 0 0 18px #2dd4bf88; }
.cat-nonmetal   { background: #1a0909; color: #f87171; border-color: #991b1b; }
.cat-nonmetal:hover { box-shadow: 0 0 18px #f8717188; }
.cat-halogen    { background: #180a14; color: #f472b6; border-color: #9d174d; }
.cat-halogen:hover { box-shadow: 0 0 18px #f472b688; }
.cat-noble      { background: #08081a; color: #818cf8; border-color: #3730a3; }
.cat-noble:hover { box-shadow: 0 0 18px #818cf888; }
.cat-lanthanide { background: #1a100a; color: #fb923c; border-color: #9a3412; }
.cat-lanthanide:hover { box-shadow: 0 0 18px #fb923c88; }
.cat-actinide   { background: #071a12; color: #34d399; border-color: #065f46; }
.cat-actinide:hover { box-shadow: 0 0 18px #34d39988; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(10px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 20px;
}
.modal.open { display: flex; }
.modal-box {
  background: linear-gradient(160deg, #0d1b2a 0%, #0a1628 100%);
  border: 1px solid var(--accent);
  border-radius: 22px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 0 60px #00e5ff22, 0 20px 60px rgba(0,0,0,0.7);
  animation: pop 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }
.modal-box::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
@keyframes pop { from { transform: scale(0.78); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.modal-header {
  padding: 20px 22px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-num-badge {
  background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.78em;
  color: var(--accent);
  letter-spacing: 2px;
}
.close-btn {
  background: rgba(255,255,255,0.06); border: 1px solid #1e3a5f;
  color: var(--dim); width: 32px; height: 32px;
  border-radius: 50%; font-size: 1.2em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.close-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

.modal-illust {
  width: 100%; height: 150px;
  display: flex; justify-content: center; align-items: center;
  padding: 10px 16px;
}

.modal-center { text-align: center; padding: 0 22px 14px; }
.modal-sym {
  font-size: 4.8em; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 18px var(--accent));
}
.modal-name-ja { font-size: 1.55em; margin: 6px 0 3px; font-weight: 300; }
.modal-name-en {
  font-size: 0.82em; color: var(--accent);
  letter-spacing: 3px; text-transform: uppercase;
  opacity: 0.8;
}
.modal-cat {
  display: inline-block; margin-top: 10px;
  padding: 3px 14px; border-radius: 20px;
  font-size: 0.7em; border: 1px solid;
}

.modal-info {
  margin: 14px 22px;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 0.83em;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.info-item { display: flex; flex-direction: column; gap: 3px; }
.info-label { color: var(--dim); font-size: 0.76em; letter-spacing: 0.5px; }
.info-val { color: var(--text); }

.music-bar {
  margin: 0 22px 14px;
  background: rgba(0,229,255,0.05);
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 30px;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.78em; color: var(--dim);
}
.music-note { font-size: 1.2em; color: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.5; transform:scale(0.9)} }
.music-label { flex: 1; color: #94a3b8; }
.music-stop {
  background: rgba(255,255,255,0.08); border: 1px solid #1e3a5f;
  color: var(--dim); cursor: pointer; font-size: 0.85em;
  padding: 3px 9px; border-radius: 10px; transition: all 0.2s;
}
.music-stop:hover { background: rgba(255,255,255,0.15); color: #fff; }

.modal-desc {
  margin: 0 22px 22px;
  padding: 14px 16px;
  background: rgba(0,229,255,0.04);
  border: 1px solid rgba(0,229,255,0.12);
  border-radius: 12px;
  font-size: 0.85em;
  line-height: 1.75;
  color: #b0bec5;
}
.modal-desc strong { color: var(--accent); display: block; margin-bottom: 6px; }

.lan-label {
  text-align: center;
  font-size: 0.65em;
  color: var(--dim);
  letter-spacing: 1px;
  margin: 6px 0 2px;
  grid-column: 1 / -1;
}

/* TOP BAR */
.top-bar {
  position: relative; z-index: 2;
  display: flex; flex-wrap: wrap;
  justify-content: center; align-items: center;
  gap: 10px; padding: 10px 16px;
}
.top-bar-bg {
  background: rgba(4,8,15,0.85);
  border: 1px solid #1e3a5f;
  border-radius: 40px;
  display: flex; flex-wrap: wrap;
  align-items: center; gap: 8px;
  padding: 8px 14px;
  backdrop-filter: blur(8px);
}
.search-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid #1e3a5f;
  border-radius: 20px;
  padding: 6px 14px;
  color: var(--text);
  font-size: 0.82em;
  width: 200px; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.filter-btn {
  padding: 4px 12px; border-radius: 16px;
  border: 1px solid #1e3a5f;
  background: transparent; color: var(--dim);
  font-size: 0.72em; cursor: pointer;
  transition: all 0.18s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { color: #000; font-weight: bold; }
.theme-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid #1e3a5f;
  border-radius: 20px; padding: 5px 12px;
  color: var(--dim); font-size: 0.8em;
  cursor: pointer; transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

/* TODAY BOX */
.today-box {
  background: rgba(0,229,255,0.05);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 14px;
  padding: 10px 18px;
  display: flex; align-items: center; gap: 14px;
  margin: 0 auto 12px;
  width: fit-content; cursor: pointer;
  transition: all 0.2s; position: relative; z-index: 1;
}
.today-box:hover { background: rgba(0,229,255,0.1); border-color: var(--accent); }
.today-sym { font-size: 2em; font-weight: 800; color: var(--accent); }
.today-info { font-size: 0.8em; }
.today-label { color: var(--dim); font-size: 0.72em; letter-spacing: 1px; }

/* TOOLTIP */
.el { position: relative; }
.tooltip {
  position: absolute;
  bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: #0d1b2a;
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 0.7em;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 200;
  color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
.el:hover .tooltip { opacity: 1; }

/* PERIOD LABELS */
.period-labels {
  display: flex; flex-direction: column;
  justify-content: flex-start;
  gap: 3px; padding-top: 0;
  margin-right: 4px;
}
.period-label {
  height: 56px; width: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6em; color: var(--dim);
}

/* TABLE WRAP FLEX */
.table-outer {
  display: flex; justify-content: center;
  align-items: flex-start;
  overflow-x: auto; padding: 0 12px 24px;
  position: relative; z-index: 1;
}

/* STATE BADGES in modal */
.state-badge {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 0.7em; margin-left: 8px;
  font-weight: 600;
}
.state-solid { background: rgba(96,165,250,0.2); color: #60a5fa; border: 1px solid #60a5fa44; }
.state-liquid { background: rgba(248,113,113,0.2); color: #f87171; border: 1px solid #f8717144; }
.state-gas { background: rgba(129,140,248,0.2); color: #818cf8; border: 1px solid #818cf844; }
.state-syn { background: rgba(251,146,60,0.2); color: #fb923c; border: 1px solid #fb923c44; }

/* USAGE TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 0 22px 14px; }
.tag {
  padding: 2px 10px; border-radius: 12px;
  font-size: 0.68em;
  background: rgba(255,255,255,0.07);
  border: 1px solid #1e3a5f;
  color: var(--dim);
}

/* MODAL NAV */
.modal-nav {
  display: flex; justify-content: space-between;
  padding: 0 22px 16px; gap: 8px;
}
.nav-btn {
  flex: 1; background: rgba(255,255,255,0.05);
  border: 1px solid #1e3a5f; border-radius: 10px;
  padding: 8px; cursor: pointer; color: var(--dim);
  font-size: 0.78em; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
  justify-content: center;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }

/* PULSE */
@keyframes elPulse {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 12px currentColor; }
}
.el.pulse-anim { animation: elPulse 2s ease-in-out infinite; }

/* TOP MUSIC BAR */
.top-music-bar {
  position: fixed; bottom: 16px; right: 16px;
  background: rgba(4,8,15,0.9);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 30px;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 8px;
  font-size: 0.75em; color: var(--dim);
  z-index: 500; backdrop-filter: blur(8px);
  box-shadow: 0 4px 20px rgba(0,229,255,0.1);
}
.top-music-bar .music-note { animation: pulse 1.5s ease-in-out infinite; color: var(--accent); }

/* DIM filtered elements */
.el.dimmed { opacity: 0.15; pointer-events: none; }

/* SEARCH HIGHLIGHT */
.el.highlight { ring: 2px solid white; }
</style>
</head>
<body>

<header>
  <h1>𝒿𝓊𝓌𝑒𝓁 𝑒𝓁𝑒𝓂𝑒𝓃𝓉𝓈</h1>
  <div class="subtitle">118の秘宝 — 元素をクリックして鑑定書をひらく</div>
</header>

<!-- Today's element -->
<div class="today-box" id="todayBox" onclick="openTodayElement()">
  <div class="today-sym" id="today-sym">?</div>
  <div class="today-info">
    <div class="today-label">✨ 今日の元素</div>
    <div id="today-name" style="font-weight:600;color:var(--text)"></div>
    <div id="today-en" style="font-size:0.75em;color:var(--accent)"></div>
  </div>
</div>

<!-- Search + Filter + Theme bar -->
<div class="top-bar">
  <div class="top-bar-bg">
    <input class="search-input" id="searchInput" placeholder="🔍 元素を検索（名前・記号・番号）" oninput="doSearch(this.value)">
    <button class="theme-btn" onclick="toggleTheme()">🌙 ライト/ダーク</button>
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)" style="color:var(--accent);border-color:var(--accent)">すべて</button>
  </div>
</div>
<!-- Category filter buttons -->
<div class="top-bar" style="padding-top:0">
  <div class="top-bar-bg" id="catFilters"></div>
</div>

<div class="legend" id="legend"></div>
<div class="table-outer">
  <div class="period-labels" id="periodLabels"></div>
  <div style="overflow-x:auto">
    <div class="periodic-table" id="table"></div>
  </div>
</div>

<!-- Top music bar (always visible) -->
<div class="top-music-bar" id="topMusicBar">
  <span class="music-note">♪</span>
  <span id="top-music-label">TOP BGM 再生中...</span>
  <button class="music-stop" onclick="stopTopMusic()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:1em;">■</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="handleModalBg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div id="m-num" class="modal-num-badge"></div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-illust" id="m-illust"></div>
    <div class="modal-center">
      <div id="m-sym" class="modal-sym"></div>
      <div id="m-name-ja" class="modal-name-ja"></div>
      <div id="m-name-en" class="modal-name-en"></div>
      <div id="m-cat" class="modal-cat"></div>
    </div>
    <div class="modal-info">
      <div class="info-item"><span class="info-label">📅 発見年</span><span class="info-val" id="m-year"></span></div>
      <div class="info-item"><span class="info-label">👤 発見者</span><span class="info-val" id="m-person"></span></div>
      <div class="info-item"><span class="info-label">📍 発見地</span><span class="info-val" id="m-place"></span></div>
      <div class="info-item"><span class="info-label">⚖️ 原子量</span><span class="info-val" id="m-mass"></span></div>
    </div>
    <div class="music-bar">
      <span class="music-note">♪</span>
      <span class="music-label" id="m-music-label">Element Theme...</span>
      <button class="music-stop" onclick="stopMusic()">■ 停止</button>
    </div>
    <div class="modal-desc">
      <strong>🔬 元素のひみつ</strong>
      <span id="m-desc"></span>
    </div>
    <div class="tags" id="m-tags"></div>
    <div class="modal-nav">
      <button class="nav-btn" id="nav-prev" onclick="navElement(-1)">← 前の元素</button>
      <button class="nav-btn" id="nav-next" onclick="navElement(+1)">次の元素 →</button>
    </div>
  </div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let actx = null;
let musicNodes = [];
let topMusicNodes = [];

function ctx() { if (!actx) actx = new AC(); return actx; }

function playClick(freq1=900, freq2=450) {
  const c = ctx();
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.frequency.setValueAtTime(freq1, c.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq2, c.currentTime + 0.1);
  g.gain.setValueAtTime(0.15, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.15);
  o.start(); o.stop(c.currentTime + 0.15);
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}

function stopTopMusic() {
  topMusicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  topMusicNodes = [];
  document.getElementById('topMusicBar').style.opacity = '0.3';
}

// Group-specific music parameters: [scale, waveform, tempo, octave, label]
const CAT_MUSIC = {
  'cat-alkali':     { scale:[261.63,293.66,329.63,392,440,523.25], wave:'sawtooth', tempo:0.28, oct:1,   label:'アルカリ金属 — 激しいビート' },
  'cat-alkaline':   { scale:[293.66,329.63,369.99,415.30,493.88,587.33], wave:'triangle', tempo:0.38, oct:1, label:'アルカリ土類 — 穏やかな響き' },

function playCategoryMusic(cat) {
  stopMusic();
  const c = ctx();
  const cfg = CAT_MUSIC[cat] || CAT_MUSIC['cat-transition'];
  const { scale, wave, tempo, oct } = cfg;
  const melody = [];
  for (let i = 0; i < 12; i++) {
    const base = scale[Math.floor(Math.random() * scale.length)];
    melody.push(base * oct);
  }
  melody.forEach((freq, i) => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = wave;
    o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    const t = c.currentTime + i * tempo + 0.15;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.07, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + tempo * 0.88);
    o.start(t); o.stop(t + tempo);
    musicNodes.push(o);
  });
  // Ambient pad
  const pad = c.createOscillator(), padG = c.createGain();
  pad.type = 'sine';
  pad.frequency.value = scale[0] * oct * 0.5;
  pad.connect(padG); padG.connect(c.destination);
  padG.gain.setValueAtTime(0.022, c.currentTime);
  pad.start();
  musicNodes.push(pad);
  setTimeout(() => { try { pad.stop(); } catch(e){} }, (melody.length * tempo + 1.8) * 1000);
}

// TOP BGM: ambient, ethereal, looping-style
function playTopBGM() {
  const c = ctx();
  stopTopMusic();
  const notes = [261.63, 293.66, 329.63, 392, 440, 349.23, 329.63, 293.66];
  const tempo = 0.55;
  function playLoop(startTime) {
    notes.forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.value = freq * 0.5;
      o.connect(g); g.connect(c.destination);
      const t = startTime + i * tempo;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, t + tempo * 0.9);
      o.start(t); o.stop(t + tempo);
      topMusicNodes.push(o);
    });
    // High harmony
    [523.25, 587.33, 659.25, 698.46].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      o.connect(g); g.connect(c.destination);
      const t = startTime + i * tempo * 2;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.03, t + 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, t + tempo * 1.8);
      o.start(t); o.stop(t + tempo * 2);
      topMusicNodes.push(o);
    });
    // Schedule next loop
    const loopDuration = notes.length * tempo;
    setTimeout(() => {
      if (topMusicNodes.length > 0) playLoop(c.currentTime + 0.05);
    }, (loopDuration - 0.2) * 1000);
  }
  playLoop(c.currentTime);
  document.getElementById('topMusicBar').style.opacity = '1';
}

// Start top BGM on first user interaction
let topBGMStarted = false;
document.addEventListener('click', () => {
  if (!topBGMStarted) { topBGMStarted = true; playTopBGM(); }
}, { once: false });

const elements = RAW.map(r => ({
  n:r[0], s:r[1], ja:r[2], en:r[3], y:r[4], p:r[5], l:r[6], m:r[7],
  cat:r[8], x:r[9], r:r[10], d:r[11], state:r[12], tags:r[13]
}));

const STATE_INFO = {
  'S': { label:'固体', cls:'state-solid' },
  'L': { label:'液体', cls:'state-liquid' },
  'G': { label:'気体', cls:'state-gas' },
  'X': { label:'人工/放射性', cls:'state-syn' },
};

// ── Today's Element ───────────────────────────────────────────
const todayEl = elements[new Date().getDate() % elements.length];
document.getElementById('today-sym').textContent = todayEl.s;
document.getElementById('today-name').textContent = todayEl.ja;
document.getElementById('today-en').textContent = todayEl.en;
document.getElementById('today-sym').style.color = CAT_COLORS[todayEl.cat];
function openTodayElement() { openModal(todayEl); }

// ── Theme toggle ──────────────────────────────────────────────
function toggleTheme() { document.body.classList.toggle('light'); }

// ── Build Legend + Filter buttons ────────────────────────────
const LEGENDS = [
  {cat:'cat-alkali',label:'アルカリ金属'},
  {cat:'cat-alkaline',label:'アルカリ土類'},
  {cat:'cat-transition',label:'遷移金属'},
  {cat:'cat-post',label:'後遷移金属'},
  {cat:'cat-metalloid',label:'半金属'},
  {cat:'cat-nonmetal',label:'非金属'},
  {cat:'cat-halogen',label:'ハロゲン'},
  {cat:'cat-noble',label:'希ガス'},
  {cat:'cat-lanthanide',label:'ランタノイド'},
  {cat:'cat-actinide',label:'アクチノイド'},
];
const legendEl = document.getElementById('legend');
LEGENDS.forEach(l => {
  const c = CAT_COLORS[l.cat];
  legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${l.label}</div>`;
});
const catFilters = document.getElementById('catFilters');
LEGENDS.forEach(l => {
  const c = CAT_COLORS[l.cat];
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = l.cat;
  btn.textContent = l.label;
  btn.style.borderColor = c + '66';
  btn.style.color = c;
  btn.onclick = function() { setFilter(l.cat, this); };
  catFilters.appendChild(btn);
});

let currentFilter = 'all';
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) { btn.classList.add('active'); btn.style.background = ''; }
  document.querySelectorAll('.el:not(.empty)').forEach(el => {
    if (cat === 'all' || el.dataset.cat === cat) {
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
    }
  });
}

// ── Search ────────────────────────────────────────────────────
function doSearch(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll('.el:not(.empty)').forEach(el => {
    if (!q) { el.classList.remove('dimmed'); return; }
    const n = el.dataset.n;
    const found = elements.find(e => e.n === +n);
    if (!found) { el.classList.add('dimmed'); return; }
    const match = found.ja.toLowerCase().includes(q) ||
                  found.en.toLowerCase().includes(q) ||
                  found.s.toLowerCase().includes(q) ||
                  String(found.n).includes(q);
    el.classList.toggle('dimmed', !match);
  });
}

// ── Build Period Labels ───────────────────────────────────────
const periodLabels = document.getElementById('periodLabels');
for (let i = 1; i <= 7; i++) {
  const div = document.createElement('div');
  div.className = 'period-label';
  div.textContent = `${i}`;
  periodLabels.appendChild(div);
}

// ── Build Table ───────────────────────────────────────────────
const table = document.getElementById('table');
table.style.gridTemplateRows = 'repeat(10,56px) 12px repeat(2,56px)';

function makeEl(elData, col, row) {
  const div = document.createElement('div');
  if (elData) {
    div.className = `el ${elData.cat}`;
    div.dataset.cat = elData.cat;
    div.dataset.n = elData.n;
    div.innerHTML = `<span class="num">${elData.n}</span><span class="sym">${elData.s}</span><div class="tooltip">${elData.ja} / ${elData.en}</div>`;
    div.style.gridColumn = col;
    div.style.gridRow = row;
    div.onclick = () => openModal(elData);
    // Pulse animation on hover area elements
    if (elData.n === todayEl.n) div.classList.add('pulse-anim');
  } else {
    div.className = 'el empty';
    div.style.gridColumn = col;
    div.style.gridRow = row;
  }
  return div;
}

// Main grid rows 1-7
for (let row = 1; row <= 7; row++) {
  for (let col = 1; col <= 18; col++) {
    const el = elements.find(e => e.x === col && e.r === row);
    table.appendChild(makeEl(el, col, row));
  }
}

// Row 8: blank spacer
for (let col = 1; col <= 18; col++) {
  const div = document.createElement('div');
  div.style.gridColumn = col;
  div.style.gridRow = 8;
  table.appendChild(div);
}

// Row 9: separator label
const lanLabel = document.createElement('div');
lanLabel.style.cssText = 'grid-column:1/19;grid-row:9;display:flex;align-items:center;justify-content:center;font-size:0.6em;color:#64748b;letter-spacing:2px;';
lanLabel.textContent = '─── ランタノイド ────────────────────────────────── アクチノイド ───';
table.appendChild(lanLabel);

// Row 10: Lanthanides 57-71
const lans = elements.filter(e => e.n>=57 && e.n<=71).sort((a,b)=>a.n-b.n);
lans.forEach((el,i) => table.appendChild(makeEl(el, 3+i, 10)));

// Row 11: Actinides 89-103
const acts = elements.filter(e => e.n>=89 && e.n<=103).sort((a,b)=>a.n-b.n);
acts.forEach((el,i) => table.appendChild(makeEl(el, 3+i, 11)));

// ── Modal ─────────────────────────────────────────────────────
let currentElN = 1;

function openModal(data) {
  currentElN = data.n;
  playClick(1000, 500);
  // Stop top BGM, play category music
  stopTopMusic();
  setTimeout(() => playCategoryMusic(data.cat), 180);

  document.getElementById('m-num').textContent = `原子番号 No.${data.n}`;
  document.getElementById('m-sym').textContent = data.s;
  document.getElementById('m-name-ja').textContent = data.ja;
  document.getElementById('m-name-en').textContent = data.en;
  document.getElementById('m-year').textContent = data.y + '年';
  document.getElementById('m-person').textContent = data.p;
  document.getElementById('m-place').textContent = data.l;
  document.getElementById('m-mass').textContent = data.m;
  document.getElementById('m-desc').textContent = data.d;

  // State badge
  const si = STATE_INFO[data.state] || STATE_INFO['S'];
  const nameJaEl = document.getElementById('m-name-ja');
  nameJaEl.innerHTML = data.ja + ` <span class="state-badge ${si.cls}">${si.label}</span>`;

  // Category music label
  const cfg = CAT_MUSIC[data.cat];
  document.getElementById('m-music-label').textContent = `♬ ${cfg ? cfg.label : data.en + ' Theme'}`;

  // Category badge
  const catEl = document.getElementById('m-cat');
  catEl.textContent = CATS_JP[data.cat] || '';
  const cc = CAT_COLORS[data.cat] || '#00e5ff';
  catEl.style.borderColor = cc;
  catEl.style.color = cc;
  catEl.style.background = cc + '20';

  // Illustration
  document.getElementById('m-illust').innerHTML = getIllust(data.n, data.s, data.cat);

  // Tags
  const tagsEl = document.getElementById('m-tags');
  tagsEl.innerHTML = (data.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');

  // Nav buttons
  const sortedNs = elements.map(e=>e.n).sort((a,b)=>a-b);
  const idx = sortedNs.indexOf(data.n);
  document.getElementById('nav-prev').disabled = idx <= 0;
  document.getElementById('nav-next').disabled = idx >= sortedNs.length - 1;

  document.getElementById('modal').classList.add('open');
}

function navElement(dir) {
  const sortedEls = [...elements].sort((a,b)=>a.n-b.n);
  const idx = sortedEls.findIndex(e => e.n === currentElN);
  const next = sortedEls[idx + dir];
  if (next) openModal(next);
}

function closeModal() {
  stopMusic();
  document.getElementById('modal').classList.remove('open');
  // Resume top BGM
  setTimeout(() => playTopBGM(), 400);
}
function handleModalBg(e) { if (e.target===document.getElementById('modal')) closeModal(); }
</script>
